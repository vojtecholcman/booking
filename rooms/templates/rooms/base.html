<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Kóřova chata{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --bs-primary: #0071c2;
      --bs-primary-rgb: 0, 113, 194;
    }
    body { background: #f2f2f2; }
    .navbar-korova { background-color: #003580; }
    .navbar-korova .navbar-brand { color: #fff; font-weight: 800; font-size: 1.3rem; }
    .navbar-korova .navbar-brand span { color: #febb02; }
    .navbar-korova .nav-link { color: rgba(255,255,255,.8) !important; }
    .navbar-korova .nav-link:hover { color: #fff !important; }
    .hero { background-color: #003580; color: #fff; padding: 2rem 0; }
    .btn-primary { background-color: #0071c2; border-color: #0071c2; }
    .btn-primary:hover { background-color: #005999; border-color: #005999; }
    .btn-primary:disabled { background-color: #aaa; border-color: #aaa; }
    .guest-chip {
      display: inline-block;
      background: #f0f7ff;
      border: 1px solid #c8dff5;
      color: #1a5276;
      font-size: .75rem;
      padding: 2px 8px;
      border-radius: 12px;
    }
    .card { box-shadow: 0 1px 4px rgba(0,0,0,.12); border: none; }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.18); }
    .card-img-top { aspect-ratio: 16/9; object-fit: cover; }
    .card-photo-placeholder {
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, #e0e7ef, #c8d8ec);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem; color: #7a9ec0;
    }
    .room-photo { width: 100%; border-radius: .5rem; aspect-ratio: 16/9; object-fit: cover; }
    .room-photo-placeholder {
      width: 100%; border-radius: .5rem; aspect-ratio: 16/9;
      background: linear-gradient(135deg, #e0e7ef, #c8d8ec);
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem; color: #7a9ec0;
    }
    .add-guest-btn {
      width: 100%; background: none; border: 1px dashed #0071c2;
      color: #0071c2; border-radius: .375rem; padding: .375rem .75rem;
      cursor: pointer; font-size: .875rem; transition: background .15s;
    }
    .add-guest-btn:hover { background: #f0f7ff; }
    .remove-btn {
      background: none; border: none; color: #999;
      cursor: pointer; font-size: 1.2rem; line-height: 1; padding: 0 .25rem;
    }
    .remove-btn:hover { color: #c00; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-korova sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand" href="/">Kóřova <span>chata</span></a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span style="color:#fff;font-size:1.5rem">☰</span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/logout/">Odhlásit</a></li>
      </ul>
    </div>
  </div>
</nav>

{% block body %}
<div class="container py-4">
  {% block content %}{% endblock %}
</div>
{% endblock %}

<footer class="text-center text-muted py-4 mt-4" style="font-size:.8rem">
  © 2026 Kóřova chata &mdash; akce 30.–31. května
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

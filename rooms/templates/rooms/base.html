<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Kóřova chata{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      background: #f2f2f2;
      color: #333;
      min-height: 100vh;
    }

    /* Header */
    .site-header {
      background: #003580;
      padding: 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .site-logo {
      color: #fff;
      text-decoration: none;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .site-logo span { color: #febb02; }
    .header-nav a {
      color: rgba(255,255,255,.85);
      text-decoration: none;
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 4px;
      transition: background .15s;
    }
    .header-nav a:hover { background: rgba(255,255,255,.15); color: #fff; }

    /* Main container */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    /* Page hero strip */
    .hero {
      background: #003580;
      color: #fff;
      padding: 28px 16px;
    }
    .hero-inner { max-width: 1100px; margin: 0 auto; }
    .hero h2 { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
    .hero p { font-size: 15px; opacity: .85; }

    /* Cards grid */
    .cards { display: grid; gap: 16px; }
    @media (min-width: 640px) { .cards { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 900px) { .cards { grid-template-columns: repeat(3, 1fr); } }

    /* Room card */
    .card {
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.12);
      display: flex;
      flex-direction: column;
      transition: box-shadow .2s;
    }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.18); }
    .card-photo {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      background: #e0e7ef;
      display: block;
    }
    .card-photo-placeholder {
      width: 100%;
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, #e0e7ef 0%, #c8d8ec 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #7a9ec0;
      font-size: 40px;
    }
    .card-body { padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .card-title { font-size: 16px; font-weight: 700; color: #1a1a1a; }
    .card-desc { color: #555; line-height: 1.5; flex: 1; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
    .capacity-badge {
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 12px;
      font-weight: 600;
    }
    .capacity-ok { background: #e8f5e9; color: #2e7d32; }
    .capacity-full { background: #fdecea; color: #c62828; }

    /* Buttons */
    .btn {
      display: inline-block;
      padding: 9px 18px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: background .15s, transform .1s;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary { background: #0071c2; color: #fff; }
    .btn-primary:hover { background: #005999; }
    .btn-primary:disabled, .btn-primary[disabled] {
      background: #aaa;
      cursor: not-allowed;
      transform: none;
    }
    .btn-secondary { background: #f2f2f2; color: #333; border: 1px solid #ccc; }
    .btn-secondary:hover { background: #e8e8e8; }
    .btn-danger { background: #fff; color: #c00; border: 1px solid #e0a0a0; }
    .btn-danger:hover { background: #fdecea; }
    .btn-sm { padding: 5px 12px; font-size: 13px; }

    /* Detail page */
    .detail-layout { display: grid; gap: 24px; }
    @media (min-width: 700px) { .detail-layout { grid-template-columns: 1fr 340px; } }

    .room-photo {
      width: 100%;
      border-radius: 8px;
      object-fit: cover;
      aspect-ratio: 16/9;
      background: #e0e7ef;
      display: block;
    }
    .room-photo-placeholder {
      width: 100%;
      border-radius: 8px;
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, #e0e7ef 0%, #c8d8ec 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #7a9ec0;
      font-size: 64px;
    }

    /* Sidebar card */
    .sidebar-card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,.12);
      padding: 20px;
    }
    .sidebar-card h3 { font-size: 18px; margin-bottom: 14px; }

    /* Guest list */
    .guest-list { list-style: none; }
    .guest-list li {
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
      color: #444;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .guest-list li::before { content: '👤'; font-size: 12px; }
    .guest-list li:last-child { border-bottom: none; }

    /* Form */
    .form-section { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.12); padding: 20px; }
    .form-section h3 { font-size: 18px; margin-bottom: 14px; }
    .form-group { margin-bottom: 10px; display: flex; gap: 8px; align-items: center; }
    .form-control {
      flex: 1;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }
    .form-control:focus { border-color: #0071c2; box-shadow: 0 0 0 2px rgba(0,113,194,.2); }
    .add-guest-btn {
      background: none;
      border: 1px dashed #0071c2;
      color: #0071c2;
      border-radius: 4px;
      padding: 7px 14px;
      cursor: pointer;
      font-size: 13px;
      width: 100%;
      margin-top: 4px;
      transition: background .15s;
    }
    .add-guest-btn:hover { background: #f0f7ff; }
    .remove-btn {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 0 4px;
      transition: color .15s;
    }
    .remove-btn:hover { color: #c00; }
    .submit-row { margin-top: 16px; }

    /* Obsazeno badge */
    .full-badge {
      display: inline-block;
      background: #fdecea;
      color: #c62828;
      font-weight: 700;
      font-size: 15px;
      padding: 10px 16px;
      border-radius: 6px;
      border: 1px solid #f5c6c6;
    }

    /* Alert / error */
    .alert {
      padding: 10px 14px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 14px;
    }
    .alert-error { background: #fdecea; color: #c62828; border: 1px solid #f5c6c6; }

    /* Breadcrumb */
    .breadcrumb { font-size: 13px; color: #666; margin-bottom: 20px; }
    .breadcrumb a { color: #0071c2; text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }

    /* Confirm page */
    .confirm-box {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,.12);
      padding: 32px 24px;
      max-width: 520px;
      margin: 0 auto;
      text-align: center;
    }
    .confirm-icon { font-size: 56px; margin-bottom: 16px; }
    .confirm-box h2 { font-size: 22px; margin-bottom: 8px; color: #1a1a1a; }
    .confirm-box p { color: #555; margin-bottom: 12px; }
    .confirm-names {
      background: #f5f9ff;
      border-radius: 6px;
      padding: 12px 16px;
      margin: 16px 0;
      text-align: left;
    }

    /* Login page */
    .login-wrap {
      min-height: calc(100vh - 56px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .login-box {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,.15);
      padding: 36px 32px;
      width: 100%;
      max-width: 380px;
    }
    .login-box h2 { font-size: 22px; margin-bottom: 6px; }
    .login-box .sub { color: #666; font-size: 13px; margin-bottom: 24px; }
    .login-box label { display: block; font-weight: 600; margin-bottom: 6px; }
    .login-box .form-control { width: 100%; margin-bottom: 16px; }
    .login-box .btn { width: 100%; text-align: center; padding: 11px; font-size: 15px; }

    /* Guest chips on card */
    .card-guests {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 2px;
    }
    .guest-chip {
      background: #f0f7ff;
      border: 1px solid #c8dff5;
      color: #1a5276;
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 12px;
      white-space: nowrap;
    }

    /* Footer */
    .site-footer {
      text-align: center;
      padding: 24px;
      color: #999;
      font-size: 12px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a class="site-logo" href="/">Kóřova <span>chata</span></a>
    <nav class="header-nav">
      <a href="/logout/">Odhlásit</a>
    </nav>
  </div>
</header>

{% block body %}
<div class="container">
  {% block content %}{% endblock %}
</div>
{% endblock %}

<footer class="site-footer">
  © 2026 Kóřova chata &mdash; akce 30.–31. května
</footer>

</body>
</html>
